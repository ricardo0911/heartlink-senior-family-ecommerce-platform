server:
  port: ${SERVER_PORT:8089}

spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]
  application:
    name: heartlink-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/heartlink?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  # Redis disabled - using in-memory token storage
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     database: 1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.heartlink.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# AI服务配置
ai-service:
  base-url: ${AI_SERVICE_BASE_URL:http://localhost:8090}
  timeout: 30000

# 文件上传配置
upload:
  path: ./upload/
  url-prefix: /upload/

# Knife4j API文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081}

notification:
  websocket:
    enabled: true
  sms:
    enabled: ${NOTIFICATION_SMS_ENABLED:false}
    webhook-url: ${NOTIFICATION_SMS_WEBHOOK_URL:}
    sign-name: ${NOTIFICATION_SMS_SIGN_NAME:HeartLink}
    template-code: ${NOTIFICATION_SMS_TEMPLATE_CODE:SOS_ALERT}
  wechat-official:
    enabled: ${NOTIFICATION_WECHAT_OFFICIAL_ENABLED:false}
    webhook-url: ${NOTIFICATION_WECHAT_OFFICIAL_WEBHOOK_URL:}
    app-id: ${NOTIFICATION_WECHAT_OFFICIAL_APP_ID:}
    template-id: ${NOTIFICATION_WECHAT_OFFICIAL_TEMPLATE_ID:SOS_ALERT_TEMPLATE}

wechat:
  mini-program:
    enabled: ${WECHAT_MINI_PROGRAM_ENABLED:false}
    app-id: ${WECHAT_MINI_PROGRAM_APP_ID:}
    app-secret: ${WECHAT_MINI_PROGRAM_APP_SECRET:}
    subscribe:
      enabled: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_ENABLED:false}
      sos-template-id: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_SOS_TEMPLATE_ID:}
      page: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_PAGE:pages/index/index}
      miniprogram-state: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_STATE:formal}
      lang: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_LANG:zh_CN}
      alert-type-key: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_ALERT_TYPE_KEY:thing1}
      content-key: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_CONTENT_KEY:thing2}
      time-key: ${WECHAT_MINI_PROGRAM_SUBSCRIBE_TIME_KEY:time3}

logistics:
  enabled: ${LOGISTICS_ENABLED:true}
  provider: ${LOGISTICS_PROVIDER:mock}
  query-on-ship: ${LOGISTICS_QUERY_ON_SHIP:true}
  kdniao:
    enabled: ${LOGISTICS_KDNIAO_ENABLED:${LOGISTICS_ENABLED:false}}
    ebusiness-id: ${LOGISTICS_KDNIAO_EBUSINESS_ID:}
    app-key: ${LOGISTICS_KDNIAO_APP_KEY:}
    base-url: ${LOGISTICS_KDNIAO_BASE_URL:https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx}
    query-request-type: ${LOGISTICS_KDNIAO_QUERY_REQUEST_TYPE:8002}
